<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUVN - Monitoreo Térmico </title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Fuente neón -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Orbitron', sans-serif !important;
            font-weight: bold !important;
            background: #050505;
            color: #0ff; /* neón celeste */
        }

        .neon-text {
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff;
        }

        .neon-card {
            border: 2px solid #0ff;
            box-shadow: 0 0 5px #0ff, 0 0 10px #0ff inset;
            transition: 0.3s;
        }

        .neon-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #0ff, 0 0 20px #0ff inset;
        }

        /* ALERTA GLOBAL */
        .alerta {
            background: red !important;
        }

        #timeDisplay {
            color: red !important;
            text-shadow: 0 0 10px red;
        }

        /* === TERMÓMETROS === */
        .thermo-wrapper {
            height: 140px;
            width: 40px;
            border: 3px solid #0ff;
            border-radius: 20px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px #0ff;
        }

        .thermo-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,255,255,0.8);
            box-shadow: 0 0 10px #0ff;
            transition: height 0.4s ease-out;
        }

    </style>
</head>

<body id="mainBody" class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-black border-b-4 border-cyan-400 shadow-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-3xl neon-text">TUVN - SISTEMA NEÓN</h1>

            <div class="flex items-center gap-3">
                <div class="relative flex h-3 w-3">
                    <span id="pingDot" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-300 hidden"></span>
                    <span id="staticDot" class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </div>
                <span id="statusText" class="text-cyan-300">DESCONECTADO</span>
            </div>
        </div>
    </header>

    <!-- BARRA -->
    <div class="bg-black text-cyan-300 border-b border-cyan-800">
        <div class="container mx-auto px-4 py-2 flex justify-between text-sm">
            <span>Desarrolladores: JOEL - ALEXIS - SEBASTIÁN</span>

            <div class="flex gap-3">
                <span id="dateDisplay"></span>
                <span id="timeDisplay" class="font-bold"></span>
            </div>
        </div>
    </div>

    <!-- CONTENIDO -->
    <main class="flex-grow container mx-auto px-4 py-8">

        <h2 class="text-center text-4xl neon-text mb-10">Monitoreo NEÓN de Temperatura</h2>

        <!-- GRID: AHORA 5 TARJETAS -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">

            <!-- SENSOR 1 -->
            <div class="neon-card p-6 rounded-xl text-center">
                <h3 class="text-cyan-300">SALA</h3>

                <div class="thermo-wrapper mt-4">
                    <div id="thermo1" class="thermo-level"></div>
                </div>

                <div id="val1" class="text-5xl mt-4 text-white">--</div>
                <p class="text-cyan-500 mt-2">°C</p>
            </div>

            <!-- SENSOR 2 -->
            <div class="neon-card p-6 rounded-xl text-center">
                <h3 class="text-cyan-300">COCINA</h3>

                <div class="thermo-wrapper mt-4">
                    <div id="thermo2" class="thermo-level"></div>
                </div>

                <div id="val2" class="text-5xl mt-4 text-white">--</div>
                <p class="text-cyan-500 mt-2">°C</p>
            </div>

            <!-- SENSOR 3 -->
            <div class="neon-card p-6 rounded-xl text-center">
                <h3 class="text-cyan-300">HABITACIÓN</h3>

                <div class="thermo-wrapper mt-4">
                    <div id="thermo3" class="thermo-level"></div>
                </div>

                <div id="val3" class="text-5xl mt-4 text-white">--</div>
                <p class="text-cyan-500 mt-2">°C</p>
            </div>

            <!-- SENSOR 4 -->
            <div class="neon-card p-6 rounded-xl text-center">
                <h3 class="text-cyan-300">SALA DE ESTUDIO</h3>

                <div class="thermo-wrapper mt-4">
                    <div id="thermo4" class="thermo-level"></div>
                </div>

                <div id="val4" class="text-5xl mt-4 text-white">--</div>
                <p class="text-cyan-500 mt-2">°C</p>
            </div>

            <!-- ⚡ SENSOR GENERAL ⚡ -->
            <div class="neon-card p-6 rounded-xl text-center">
                <h3 class="text-cyan-300">TEMPERATURA GENERAL</h3>

                <div class="thermo-wrapper mt-4">
                    <div id="thermoG" class="thermo-level"></div>
                </div>

                <div id="valG" class="text-5xl mt-4 text-white">--</div>
                <p class="text-cyan-500 mt-2">°C</p>
            </div>

        </div>

        <!-- BOTÓN -->
        <div class="text-center mt-10">
            <button id="connectBtn" onclick="toggleConnection()" class="px-10 py-4 rounded-full bg-cyan-500 text-black font-bold shadow-xl hover:bg-cyan-300">
                🔗 CONECTAR
            </button>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-black text-cyan-500 text-center py-4 text-xs">
        © 2025 TUVN — Sistema Neón
    </footer>

<!-- JAVASCRIPT -->
<script>

    /* RELOJ */
    function updateClock() {
        const now = new Date();
        document.getElementById('dateDisplay').textContent = now.toLocaleDateString('es-EC');
        document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('es-EC');
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* UUID BLE */
    const serviceUuid = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const characteristicUuid = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    let bluetoothDevice;
    let bleCharacteristic;

    /* ELEMENTOS */
    const val1 = document.getElementById('val1');
    const val2 = document.getElementById('val2');
    const val3 = document.getElementById('val3');
    const val4 = document.getElementById('val4');
    const valG = document.getElementById('valG');

    const th1 = document.getElementById('thermo1');
    const th2 = document.getElementById('thermo2');
    const th3 = document.getElementById('thermo3');
    const th4 = document.getElementById('thermo4');
    const thG = document.getElementById('thermoG');

    const mainBody = document.getElementById("mainBody");

    /* CONEXIÓN */
    async function toggleConnection() {
        if (bluetoothDevice && bluetoothDevice.gatt.connected) bluetoothDevice.gatt.disconnect();
        else connect();
    }

    async function connect() {
        try {
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'TUVN_Termometros' }],
                optionalServices: [serviceUuid]
            });

            const server = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService(serviceUuid);
            bleCharacteristic = await service.getCharacteristic(characteristicUuid);

            await bleCharacteristic.startNotifications();
            bleCharacteristic.addEventListener('characteristicvaluechanged', handleData);

            document.getElementById("connectBtn").textContent = "🔴 DESCONECTAR";
        }
        catch {
            document.getElementById("connectBtn").textContent = "🔗 CONECTAR";
        }
    }

    /* PROCESAR DATOS */
    function handleData(e) {
        const data = JSON.parse(new TextDecoder().decode(e.target.value));

        if (data.s1 !== undefined) updateSensor(val1, th1, data.s1);
        if (data.s2 !== undefined) updateSensor(val2, th2, data.s2);
        if (data.s3 !== undefined) updateSensor(val3, th3, data.s3);
        if (data.s4 !== undefined) updateSensor(val4, th4, data.s4);

        /* Nueva temperatura general */
        if (data.general !== undefined) updateSensor(valG, thG, data.general);

        verificarTemperaturas(data);
    }

    /* ACTUALIZA TERMÓMETRO + VALOR */
    function updateSensor(label, bar, temp) {
        label.textContent = temp.toFixed(1);
        
        let porcentaje = (temp / 50) * 100;
        if (porcentaje < 0) porcentaje = 0;
        if (porcentaje > 100) porcentaje = 100;

        bar.style.height = porcentaje + "%";
    }

    /* ALERTA GENERAL */
    function verificarTemperaturas(data) {
        if ([data.s1, data.s2, data.s3, data.s4, data.general].some(v => v >= 25)) {
            mainBody.classList.add("alerta");
        } else {
            mainBody.classList.remove("alerta");
        }
    }

</script>

</body>
</html>
